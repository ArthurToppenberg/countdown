name: Send daglig email (all users)

on:
  workflow_dispatch:

jobs:
  send-daglig-email-all:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Send daily email to all users
        uses: ./.github/actions/trigger-daglig-endpoint
        env:
          APP_URL: ${{ vars.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        with:
          endpoint: api/cron/daglig/all
