name: Send daglig email

on:
  schedule:
    # 04:00 and 05:00 UTC cover 06:00 Copenhagen in CEST and CET; the endpoint only
    # sends during the 06:00 Copenhagen window, so the other run is a no-op.
    - cron: "0 4,5 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Send to all users even if it is not 6 AM Copenhagen time
        type: boolean
        default: false
      force_admin:
        description: Send to admins only, even if it is not 6 AM Copenhagen time
        type: boolean
        default: false

jobs:
  send-daglig-email:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger daily email endpoint
        env:
          APP_URL: ${{ vars.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
          FORCE_ADMIN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_admin }}
        run: |
          set -euo pipefail
          url="${APP_URL%/}/api/cron/daglig"
          if [ "${FORCE_ADMIN}" = "true" ]; then
            url="${url}?force=admin"
          elif [ "${FORCE}" = "true" ]; then
            url="${url}?force=true"
          fi
          status=$(curl --silent --show-error --fail-with-body \
            --output /tmp/daglig-response.json --write-out "%{http_code}" \
            --request POST \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            --header "Cache-Control: no-cache" \
            --header "Pragma: no-cache" \
            "${url}")
          echo "HTTP ${status}"
          cat /tmp/daglig-response.json
          echo

          if jq -e 'has("sent") and (.sent | type) == "boolean" and .sent == false' \
            /tmp/daglig-response.json >/dev/null; then
            reason=$(jq -r '.reason // "unknown"' /tmp/daglig-response.json)
            case "${reason}" in
              outside-window|active-event)
                echo "::notice::Daily email skipped (${reason})"
                ;;
              *)
                echo "::error::Daily email was not sent (${reason})"
                exit 1
                ;;
            esac
          fi

          if jq -e 'has("error")' /tmp/daglig-response.json >/dev/null; then
            echo "::error::$(jq -r '.error' /tmp/daglig-response.json)"
            exit 1
          fi
